<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>販売登録 | 美酒館トラッカー</title>
<style>
  :root {
    --bg: #eceae6; --surface: #ffffff; --surface2: #f6f4f0; --text: #1c1a17; --muted: #78716a;
    --line: #ddd8d0; --accent: #7b1e2b; --accent2: #a83246;
    --line-g: #06c755; --yahoo: #ef2b2d; --shopify: #6a52cf;
    --ok: #1a7f5a; --err: #c0392b; --warn: #b8791b;
    --shadow: 0 2px 6px rgba(60,40,30,.10), 0 1px 2px rgba(60,40,30,.06);
    --shadow-lg: 0 6px 20px rgba(60,40,30,.14);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #13110d; --surface: #24201a; --surface2: #2d2822; --text: #efe9df; --muted: #a49c8f;
      --line: #3a352e; --accent: #e0899a; --accent2: #e0899a;
      --line-g: #2fce77; --yahoo: #ff5a5c; --shopify: #9b86f0;
      --ok: #4fd6a0; --err: #e08a7d; --warn: #e0b463;
      --shadow: 0 2px 8px rgba(0,0,0,.4); --shadow-lg: 0 8px 26px rgba(0,0,0,.5);
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic UI", "Meiryo", system-ui, sans-serif;
    line-height: 1.6; -webkit-font-smoothing: antialiased; }
  header { padding: 18px 18px 14px; border-bottom: 1px solid var(--line); background: var(--surface); position: sticky; top: 0; z-index: 20; }
  .wrap { max-width: 1000px; margin: 0 auto; }
  h1 { font-size: 1.2rem; margin: 0 0 4px; }
  h1 .en { color: var(--muted); font-weight: 400; font-size: .78rem; margin-left: 6px; }
  nav { display: flex; gap: 14px; margin: 8px 0 2px; font-size: .86rem; flex-wrap: wrap; }
  nav a { color: var(--muted); text-decoration: none; padding-bottom: 3px; }
  nav a.active { color: var(--accent); border-bottom: 2px solid var(--accent); font-weight: 600; }
  .meta { color: var(--muted); font-size: .82rem; margin-top: 6px; }
  .meta b { color: var(--text); }
  .toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-top: 12px; }
  input[type="search"] { flex: 1; min-width: 160px; font-size: .9rem; padding: 8px 11px;
    border: 1px solid var(--line); border-radius: 9px; background: var(--surface2); color: var(--text); }
  button { font-size: .85rem; font-weight: 600; padding: 8px 13px; border: 1px solid var(--line);
    border-radius: 9px; background: var(--surface); color: var(--text); cursor: pointer; }
  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.ghost { background: transparent; }
  .toolbar select { font-size: .85rem; padding: 8px 10px; border: 1px solid var(--line); border-radius: 9px; background: var(--surface2); color: var(--text); }
  .sync { font-size: .78rem; margin-left: auto; display: flex; align-items: center; gap: 6px; color: var(--muted); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .sync.ok .dot { background: var(--ok); } .sync.saving .dot { background: var(--warn); }
  .sync.err .dot { background: var(--err); }
  main { max-width: 1000px; margin: 0 auto; padding: 16px 14px 90px; }
  .empty { text-align: center; color: var(--muted); padding: 40px 20px; }

  /* ---- 販売カード ---- */
  .sale { background: var(--surface); border: 1px solid var(--line); border-radius: 16px;
    box-shadow: var(--shadow); margin-bottom: 20px; overflow: hidden; transition: box-shadow .15s; }
  .sale:hover { box-shadow: var(--shadow-lg); }
  .sale.dupe { outline: 2px solid var(--err); outline-offset: -1px; }
  .sale-head { display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    padding: 12px 15px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  @media (prefers-color-scheme: dark) { .sale-head { background: linear-gradient(90deg, #3a1f27, #2d2822); } }
  .sale-head .sid { width: 104px; font-family: ui-monospace, monospace; font-weight: 700; font-size: .82rem;
    color: #fff; background: rgba(255,255,255,.16); border: none; border-radius: 7px; padding: 6px 8px; }
  .sale-head .sname { flex: 1; min-width: 180px; font-weight: 600; font-size: .95rem; color: #fff;
    background: rgba(255,255,255,.14); border: 1px solid rgba(255,255,255,.2); border-radius: 8px; padding: 7px 10px; }
  .sale-head .sname::placeholder { color: rgba(255,255,255,.6); }
  .sale-head .del { color: #fff; border: 1px solid rgba(255,255,255,.35); background: rgba(0,0,0,.12);
    padding: 6px 11px; border-radius: 8px; font-size: .8rem; }
  .chips { display: flex; gap: 6px; padding: 10px 15px 0; flex-wrap: wrap; }
  .chip { font-size: .7rem; font-weight: 700; padding: 3px 9px; border-radius: 999px;
    border: 1.5px solid var(--line); color: var(--muted); background: var(--surface2); opacity: .55; }
  .chip.on { opacity: 1; color: #fff; }
  .chip.line.on { background: var(--line-g); border-color: var(--line-g); }
  .chip.yahoo.on { background: var(--yahoo); border-color: var(--yahoo); }
  .chip.shopify.on { background: var(--shopify); border-color: var(--shopify); }

  .sec { padding: 12px 15px; border-top: 1px solid var(--line); }
  .sec:first-of-type { border-top: none; }
  .sec-t { font-size: .74rem; color: var(--muted); font-weight: 600; margin-bottom: 8px; letter-spacing: .02em; }
  .sale input, .sale select { font-size: .86rem; padding: 6px 9px; border: 1px solid var(--line);
    border-radius: 8px; background: var(--surface2); color: var(--text); }

  /* チャネル行 */
  .chan { display: grid; grid-template-columns: 128px 1fr auto; gap: 8px; align-items: center; margin-bottom: 8px; }
  .chan:last-child { margin-bottom: 0; }
  .chan .clabel { display: flex; align-items: center; gap: 7px; font-size: .82rem; font-weight: 600; }
  .chan .clabel .tag { width: 10px; height: 10px; border-radius: 3px; }
  .chan.line .tag { background: var(--line-g); } .chan.yahoo .tag { background: var(--yahoo); } .chan.shopify .tag { background: var(--shopify); }
  .chan .fields { display: flex; gap: 6px; flex-wrap: wrap; }
  .chan .fields input, .chan .fields select { flex: 1; min-width: 120px; }
  .chan .idf { max-width: 150px; }
  .chan .price { font-size: .78rem; color: var(--ok); white-space: nowrap; }
  .chan .price.dupe { color: var(--err); font-weight: 700; }
  .chan a.ext { font-size: .8rem; color: var(--accent); text-decoration: none; white-space: nowrap; }
  .chan a.ext.off { color: var(--muted); opacity: .4; pointer-events: none; }
  .switch { position: relative; width: 38px; height: 22px; flex: none; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; background: var(--line); border-radius: 999px; transition: .2s; cursor: pointer; }
  .slider::before { content: ""; position: absolute; width: 16px; height: 16px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .2s; }
  .switch input:checked + .slider { background: var(--ok); }
  .switch input:checked + .slider::before { transform: translateX(16px); }

  /* 構成品 */
  .items { display: flex; flex-direction: column; gap: 7px; }
  .item { display: flex; gap: 7px; align-items: center; }
  .item select { flex: 1; min-width: 150px; }
  .item .qty { width: 66px; text-align: center; }
  .item .times { color: var(--muted); }
  .item .x { color: var(--err); border: none; background: transparent; cursor: pointer; font-size: .95rem; padding: 2px 6px; }
  .additem { align-self: flex-start; font-size: .78rem; padding: 5px 11px; }
  .memo { width: 100%; }
  .nomsg { color: var(--muted); font-size: .82rem; }

  #gate { position: fixed; inset: 0; z-index: 999; background: var(--bg); display: flex; align-items: center; justify-content: center; padding: 20px; }
  #gate .box { background: var(--surface); border: 1px solid var(--line); border-radius: 16px; box-shadow: var(--shadow-lg); padding: 30px 26px; width: 100%; max-width: 360px; text-align: center; }
  #gate h2 { margin: 0 0 6px; font-size: 1.05rem; }
  #gate p { margin: 0 0 18px; color: var(--muted); font-size: .82rem; }
  #gate input { width: 100%; font-size: 1rem; padding: 11px 13px; border: 1px solid var(--line); border-radius: 10px; background: var(--surface2); color: var(--text); text-align: center; margin-bottom: 12px; }
  #gate button { width: 100%; font-size: .95rem; padding: 11px; border: none; border-radius: 10px; background: var(--accent); color: #fff; }
  #gate .err { color: var(--err); font-size: .8rem; min-height: 1.2em; margin-top: 10px; }
  body.locked { overflow: hidden; }
</style>
</head>
<body class="locked">
<div id="gate">
  <div class="box">
    <h2>販売登録</h2>
    <p>閲覧には合言葉が必要です</p>
    <input type="password" id="gatepw" placeholder="合言葉を入力" autocomplete="current-password">
    <button id="gatebtn">開く</button>
    <div class="err" id="gateerr"></div>
  </div>
</div>

<header>
  <div class="wrap">
    <h1>販売登録<span class="en">sales &rarr; マーケット掲載</span></h1>
    <nav>
      <a href="index.html">LINE GIFT 商品リスト</a>
      <a href="manage.html">社内 商品マスター</a>
      <a href="sales.html" class="active">販売登録</a>
    </nav>
    <div class="meta">
      1販売＝1出品。社内商品を「×数量」で組み立て、LINE / Yahoo / Shopify の掲載ID・URLを記録します。<br>
      販売登録 <b id="count">-</b> 件 ・ LINE <b id="cline">-</b> / Yahoo <b id="cyahoo">-</b> / Shopify <b id="cshopify">-</b> 掲載
      <span id="dupewarn" style="color:var(--err)"></span>
    </div>
    <div class="toolbar">
      <input type="search" id="q" placeholder="販売ID・販売名・掲載IDで検索…">
      <button id="addsale" class="primary">＋ 販売登録を追加</button>
      <select id="expScope" title="出力対象">
        <option value="pending">未掲載のみ</option>
        <option value="all">全件</option>
      </select>
      <button id="expYahoo" class="ghost" style="border-color:var(--yahoo);color:var(--yahoo)">Yahoo取込</button>
      <button id="expShopify" class="ghost" style="border-color:var(--shopify);color:var(--shopify)">Shopify取込</button>
      <button id="reload" class="ghost">サーバから再読込</button>
      <button id="export" class="ghost">JSONバックアップ</button>
      <span class="sync" id="sync"><span class="dot"></span><span id="syncmsg">—</span></span>
    </div>
  </div>
</header>

<main>
  <div id="list"></div>
  <div class="empty" id="empty" style="display:none">
    販売登録がありません。「＋ 販売登録を追加」から作成してください。
  </div>
</main>

<script>
const PW_HASH = "86138699a5c3861fd957004d5c07c6466e7470eb0cffd2152d928a5bcf9a738a";
const GATE_KEY = "bijoukan_gate_ok";
const CACHE_KEY = "sales_cache_v2";
// --- Supabase 設定（内部ツール用の公開キー） ---
const SB_URL = "https://qbfjeitlzrtazavklhde.supabase.co";
const SB_KEY = "sb_publishable_gCDMwBOWaSwq6uh34lWRXA_rYQ6VptD";
const SB_TABLE = SB_URL + "/rest/v1/romuan_sales";
const LINE_SHOP = "https://mall.line.me/sb/d84e5e64";

let DATA = [], BASE = [], LINE = [];

function sbHeaders(extra){ return Object.assign({ "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY, "Content-Type": "application/json" }, extra||{}); }

/* ---------- 合言葉ゲート ---------- */
async function sha256(str){ const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(str)); return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,"0")).join(""); }
function unlock(){ document.getElementById("gate").style.display="none"; document.body.classList.remove("locked"); init(); }
async function tryUnlock(){ const pw=document.getElementById("gatepw").value; if(await sha256(pw)===PW_HASH){ sessionStorage.setItem(GATE_KEY,"1"); unlock(); } else { document.getElementById("gateerr").textContent="合言葉が違います"; document.getElementById("gatepw").select(); } }
document.getElementById("gatebtn").addEventListener("click",tryUnlock);
document.getElementById("gatepw").addEventListener("keydown",e=>{ if(e.key==="Enter") tryUnlock(); });

/* ---------- 同期ステータス ---------- */
function setSync(state, msg){ const el=document.getElementById("sync"); el.className="sync "+state; document.getElementById("syncmsg").textContent=msg; }

/* ---------- 正規化 ---------- */
function emptyChan(){ return { listed:false, id:"", url:"" }; }
function normalize(s){
  s.items = Array.isArray(s.items) ? s.items : [];
  s.channels = s.channels || {};
  s.channels.linegift = Object.assign(emptyChan(), s.channels.linegift);
  s.channels.yahoo    = Object.assign(emptyChan(), s.channels.yahoo);
  s.channels.shopify  = Object.assign(emptyChan(), s.channels.shopify);
  // 旧 line_id から LINE GIFT チャネルへ移行
  if (!s.channels.linegift.id && s.line_id){ s.channels.linegift.id=s.line_id; s.channels.linegift.listed=true; s.channels.linegift.url=`${LINE_SHOP}/${s.line_id}`; }
  s.line_id = s.channels.linegift.id || "";
  s.memo = s.memo || "";
  return s;
}

/* ---------- 読み込み ---------- */
async function init(){
  // 社内商品（構成品ドロップダウン）— Supabaseから取得
  try {
    const r = await fetch(SB_URL + "/rest/v1/romuan_products?select=id,name,stock&order=position.asc,id.asc", { headers: sbHeaders() });
    BASE = r.ok ? await r.json() : [];
    if (BASE.length) localStorage.setItem("base_cache_v2", JSON.stringify(BASE));
  } catch {
    const c = localStorage.getItem("base_cache_v2"); BASE = c ? JSON.parse(c) : [];
  }
  // LINE GIFT 商品（価格・紐付け）
  try {
    const d = await (await fetch("products.json?_="+Date.now())).json();
    LINE = (d.products||[]).slice().sort((a,b)=>(a.name_full||a.name||"").localeCompare(b.name_full||b.name||"","ja"));
  } catch { LINE=[]; }
  await loadServer();
}
async function loadServer(){
  setSync("saving","読み込み中…");
  try {
    const r = await fetch(SB_TABLE + "?select=*&order=position.asc", { headers: sbHeaders() });
    if (!r.ok) throw new Error("HTTP "+r.status);
    DATA = (await r.json()).map(normalize);
    localStorage.setItem(CACHE_KEY, JSON.stringify(DATA));
    setSync("ok","サーバと同期済み ✓");
  } catch (e) {
    const c = localStorage.getItem(CACHE_KEY);
    DATA = c ? JSON.parse(c).map(normalize) : [];
    setSync("err","オフライン: キャッシュ表示中");
  }
  render();
}

/* ---------- サーバ保存 ---------- */
const timers = {};
function scheduleSave(id){
  clearTimeout(timers[id]);
  setSync("saving","保存中…");
  timers[id] = setTimeout(()=>pushRow(id), 500);
}
async function pushRow(id){
  const s = DATA.find(x=>x.id===id); if(!s) return;
  const body = { id:s.id, name:s.name, line_id:s.channels.linegift.id||"", items:s.items, channels:s.channels, memo:s.memo, position:s.position||0 };
  try {
    const r = await fetch(SB_TABLE, { method:"POST", headers: sbHeaders({ "Prefer":"resolution=merge-duplicates,return=minimal" }), body: JSON.stringify([body]) });
    if (!r.ok) throw new Error("HTTP "+r.status);
    setSync("ok","サーバ保存済み ✓");
    localStorage.setItem(CACHE_KEY, JSON.stringify(DATA));
  } catch(e){ setSync("err","⚠ サーバ未保存（後で再試行）"); }
}
async function deleteRow(id){
  try { await fetch(SB_TABLE + "?id=eq."+encodeURIComponent(id), { method:"DELETE", headers: sbHeaders() }); setSync("ok","削除しました ✓"); }
  catch(e){ setSync("err","⚠ 削除の同期に失敗"); }
  localStorage.setItem(CACHE_KEY, JSON.stringify(DATA));
}

/* ---------- 描画 ---------- */
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function baseName(id){ const p=BASE.find(x=>x.id===id); return p?p.name:""; }
function lineOptions(sel){
  let o = '<option value="">（LINE商品を選択…）</option>';
  for (const p of LINE){ const label=(p.name_full||p.name||"").slice(0,42);
    o += `<option value="${esc(p.id)}"${p.id===sel?" selected":""}>${esc(label)}（${esc(p.id)}）</option>`; }
  if (sel && !LINE.some(p=>p.id===sel)) o += `<option value="${esc(sel)}" selected>${esc(sel)}（一覧外）</option>`;
  return o;
}
function baseOptions(sel){
  let o = '<option value="">（商品を選択…）</option>';
  for (const p of BASE){ o += `<option value="${esc(p.id)}"${p.id===sel?" selected":""}>${esc(p.name)}（${esc(p.id)}）</option>`; }
  if (sel && !BASE.some(p=>p.id===sel)) o += `<option value="${esc(sel)}" selected>${esc(sel)}（マスター外）</option>`;
  return o;
}
function lineCounts(){ const c={}; DATA.forEach(s=>{ const id=s.channels.linegift.id; if(id) c[id]=(c[id]||0)+1; }); return c; }

function render(){
  const q = document.getElementById("q").value.trim().toLowerCase();
  const list = document.getElementById("list"); list.innerHTML="";
  const counts = lineCounts();
  let cLine=0,cYahoo=0,cShopify=0,dupes=0;

  DATA.forEach((s,si)=>{
    const ch=s.channels;
    if (ch.linegift.listed) cLine++; if (ch.yahoo.listed) cYahoo++; if (ch.shopify.listed) cShopify++;
    const lp = LINE.find(x=>x.id===ch.linegift.id);
    const lineLabel = lp ? (lp.name_full||lp.name) : ch.linegift.id;
    const hay=[s.id,s.name,lineLabel,ch.yahoo.id,ch.shopify.id,...(s.items||[]).map(it=>baseName(it.product_id))].join(" ").toLowerCase();
    if (q && !hay.includes(q)) return;
    const isDupe = ch.linegift.id && counts[ch.linegift.id]>1;
    if (isDupe) dupes++;

    const items = (s.items||[]).map((it,ii)=>
      `<div class="item">
         <select data-si="${si}" data-ii="${ii}" data-if="product_id">${baseOptions(it.product_id)}</select>
         <span class="times">×</span>
         <input class="qty" type="number" min="1" value="${Number(it.qty)||1}" data-si="${si}" data-ii="${ii}" data-if="qty">
         <button class="x" data-si="${si}" data-ii="${ii}" data-act="delitem" title="削除">✕</button>
       </div>`).join("") || '<div class="nomsg">構成品がありません</div>';

    let lprice, pdupe="";
    if (isDupe){ lprice="⚠ 他の販売にも同じLINE商品が紐付いています"; pdupe=" dupe"; }
    else if (lp){ lprice=`¥${Number(lp.price).toLocaleString('ja-JP')} / ${lp.in_stock?'販売中':'在庫なし'}`; }
    else if (ch.linegift.id){ lprice="（LINE一覧外）"; } else { lprice=""; }

    const chip = (on,cls,label)=>`<span class="chip ${cls} ${on?'on':''}">${label}</span>`;
    const el=document.createElement("div");
    el.className="sale"+(isDupe?" dupe":"");
    el.innerHTML=
      `<div class="sale-head">
         <input class="sid" value="${esc(s.id)}" data-si="${si}" data-f="id" title="販売ID">
         <input class="sname" value="${esc(s.name)}" data-si="${si}" data-f="name" placeholder="販売名（例: ボクソンドガ紅白セット）">
         <button class="del" data-si="${si}" data-act="delsale">削除</button>
       </div>
       <div class="chips">
         ${chip(ch.linegift.listed,'line','LINE GIFT')}
         ${chip(ch.yahoo.listed,'yahoo','Yahoo!ショップ')}
         ${chip(ch.shopify.listed,'shopify','Shopify')}
       </div>
       <div class="sec">
         <div class="sec-t">掲載マーケット（掲載フラグ・掲載ID・URL）</div>
         <div class="chan line">
           <div class="clabel"><span class="switch"><input type="checkbox" ${ch.linegift.listed?'checked':''} data-si="${si}" data-ch="linegift" data-cf="listed"><span class="slider"></span></span><span class="tag"></span>LINE GIFT</div>
           <div class="fields">
             <select data-si="${si}" data-ch="linegift" data-cf="pick">${lineOptions(ch.linegift.id)}</select>
             <span class="price${pdupe}">${esc(lprice)}</span>
           </div>
           <a class="ext ${ch.linegift.url?'':'off'}" href="${esc(ch.linegift.url||'#')}" target="_blank" rel="noopener">開く ↗</a>
         </div>
         <div class="chan yahoo">
           <div class="clabel"><span class="switch"><input type="checkbox" ${ch.yahoo.listed?'checked':''} data-si="${si}" data-ch="yahoo" data-cf="listed"><span class="slider"></span></span><span class="tag"></span>Yahoo!ショップ</div>
           <div class="fields">
             <input class="idf" placeholder="掲載ID" value="${esc(ch.yahoo.id)}" data-si="${si}" data-ch="yahoo" data-cf="id">
             <input placeholder="URL" value="${esc(ch.yahoo.url)}" data-si="${si}" data-ch="yahoo" data-cf="url">
           </div>
           <a class="ext ${ch.yahoo.url?'':'off'}" href="${esc(ch.yahoo.url||'#')}" target="_blank" rel="noopener">開く ↗</a>
         </div>
         <div class="chan shopify">
           <div class="clabel"><span class="switch"><input type="checkbox" ${ch.shopify.listed?'checked':''} data-si="${si}" data-ch="shopify" data-cf="listed"><span class="slider"></span></span><span class="tag"></span>Shopify</div>
           <div class="fields">
             <input class="idf" placeholder="掲載ID" value="${esc(ch.shopify.id)}" data-si="${si}" data-ch="shopify" data-cf="id">
             <input placeholder="URL" value="${esc(ch.shopify.url)}" data-si="${si}" data-ch="shopify" data-cf="url">
           </div>
           <a class="ext ${ch.shopify.url?'':'off'}" href="${esc(ch.shopify.url||'#')}" target="_blank" rel="noopener">開く ↗</a>
         </div>
       </div>
       <div class="sec">
         <div class="sec-t">構成品（社内商品 × 数量）</div>
         <div class="items">${items}<button class="additem ghost" data-si="${si}" data-act="additem">＋ 構成品を追加</button></div>
       </div>
       <div class="sec">
         <input class="memo" value="${esc(s.memo||"")}" data-si="${si}" data-f="memo" placeholder="メモ">
       </div>`;
    list.appendChild(el);
  });

  document.getElementById("count").textContent = DATA.length;
  document.getElementById("cline").textContent = cLine;
  document.getElementById("cyahoo").textContent = cYahoo;
  document.getElementById("cshopify").textContent = cShopify;
  const withContent = DATA.filter(s=>lineOf(s)||s.name);
  const pendY = withContent.filter(s=>!s.channels.yahoo.listed).length;
  const pendS = withContent.filter(s=>!s.channels.shopify.listed).length;
  document.getElementById("expYahoo").textContent = `Yahoo取込 (未${pendY})`;
  document.getElementById("expShopify").textContent = `Shopify取込 (未${pendS})`;
  document.getElementById("dupewarn").textContent = dupes ? `　⚠ LINE重複紐付け ${dupes} 件` : "";
  document.getElementById("empty").style.display = DATA.length ? "none" : "block";
}

/* ---------- 編集 ---------- */
document.getElementById("list").addEventListener("input",e=>{
  const el=e.target, si=el.dataset.si; if(si==null) return;
  const s=DATA[si];
  if (el.dataset.ch){                      // チャネル
    const ch=s.channels[el.dataset.ch], f=el.dataset.cf;
    if (f==="listed"){ ch.listed=el.checked; render(); }
    else if (f==="pick"){ ch.id=el.value; ch.listed=!!el.value; ch.url=el.value?`${LINE_SHOP}/${el.value}`:""; s.line_id=ch.id; render(); }
    else { ch[f]=el.value; if(f==="url"){ const a=el.closest(".chan").querySelector("a.ext"); a.href=el.value||"#"; a.classList.toggle("off",!el.value); } }
    scheduleSave(s.id);
  } else if (el.dataset.if){                // 構成品
    const it=s.items[el.dataset.ii];
    if (el.dataset.if==="qty") it.qty=Math.max(1,parseInt(el.value||"1",10)||1); else it.product_id=el.value;
    scheduleSave(s.id); if(el.tagName==="SELECT") render();
  } else if (el.dataset.f){                 // ID / 名前 / メモ
    if (el.dataset.f==="id"){ const old=s.id; s.id=el.value; if(old!==s.id){ deleteRow(old); } }
    else s[el.dataset.f]=el.value;
    scheduleSave(s.id);
  }
});
// 掲載ID/URLを入力(確定)したら、そのチャネルを自動で「掲載済み」に
document.getElementById("list").addEventListener("change",e=>{
  const el=e.target; if(el.dataset.si==null || !el.dataset.ch) return;
  if(el.dataset.cf!=="id" && el.dataset.cf!=="url") return;
  const s=DATA[el.dataset.si], ch=s.channels[el.dataset.ch];
  const has=(ch.id||"").trim() || (ch.url||"").trim();
  if(has && !ch.listed){ ch.listed=true; scheduleSave(s.id); render(); }
});
document.getElementById("list").addEventListener("click",e=>{
  const b=e.target.closest("[data-act]"); if(!b) return;
  const si=+b.dataset.si, s=DATA[si], act=b.dataset.act;
  if (act==="delsale"){ if(confirm(`${s.id||""} ${s.name||""} を削除しますか？`)){ DATA.splice(si,1); deleteRow(s.id); render(); } }
  else if (act==="additem"){ s.items=s.items||[]; s.items.push({product_id:"",qty:1}); scheduleSave(s.id); render(); }
  else if (act==="delitem"){ s.items.splice(+b.dataset.ii,1); scheduleSave(s.id); render(); }
});

function nextSaleId(){ let m=0; for(const s of DATA){ const x=/^SALE(\d+)$/.exec(s.id||""); if(x) m=Math.max(m,parseInt(x[1],10)); } return "SALE"+String(m+1).padStart(4,"0"); }
document.getElementById("addsale").addEventListener("click",()=>{
  const pos=DATA.reduce((m,s)=>Math.max(m,s.position||0),0)+1;
  const s=normalize({id:nextSaleId(),name:"",items:[],channels:{},memo:"",position:pos});
  DATA.push(s); document.getElementById("q").value=""; render(); pushRow(s.id);
  const el=document.querySelector("#list .sale:last-child"); if(el){ el.scrollIntoView({behavior:"smooth",block:"center"}); el.querySelector(".sname").focus(); }
});

/* ---------- Yahoo / Shopify 取込ファイル生成 ---------- */
function baseStock(id){ const p=BASE.find(x=>x.id===id); return p?Number(p.stock)||0:0; }
function buildableQty(s){
  const items=(s.items||[]).filter(it=>it.product_id);
  if(!items.length) return "";
  return items.reduce((m,it)=>Math.min(m, Math.floor(baseStock(it.product_id)/(Number(it.qty)||1))), Infinity);
}
function lineOf(s){ return LINE.find(x=>x.id===s.channels.linegift.id) || null; }
function bodyHtml(lp){
  if(!lp) return "";
  const parts=[];
  if(lp.catchphrase) parts.push(`<p><strong>${lp.catchphrase}</strong></p>`);
  if(lp.description) parts.push(`<p>${String(lp.description).replace(/\n/g,"<br>")}</p>`);
  if(lp.spec) parts.push(`<p>${String(lp.spec).replace(/\n/g,"<br>")}</p>`);
  return parts.join("");
}
function download(name, text, mime){
  const blob=new Blob(["﻿"+text],{type:mime}); const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download=name; a.click(); URL.revokeObjectURL(a.href);
}
function csvCell(v){ v=(v==null?"":String(v)); return '"'+v.replace(/"/g,'""')+'"'; }
function tsvCell(v){ return (v==null?"":String(v)).replace(/[\t\r\n]+/g," ").trim(); }

// Shopify 商品CSV（御社テンプレートの列に一致・UTF-8・複数画像は行を分けて出力）
const SHOPIFY_COLS = ["Handle","Title","Body (HTML)","Vendor","Product Category","Type","Tags","Published",
  "Option1 Name","Option1 Value","Option1 Linked To","Option2 Name","Option2 Value","Option2 Linked To",
  "Option3 Name","Option3 Value","Option3 Linked To","Variant SKU","Variant Grams","Variant Inventory Tracker",
  "Variant Inventory Qty","Variant Inventory Policy","Variant Fulfillment Service","Variant Price",
  "Variant Compare At Price","Variant Requires Shipping","Variant Taxable","Unit Price Total Measure",
  "Unit Price Total Measure Unit","Unit Price Base Measure","Unit Price Base Measure Unit","Variant Barcode",
  "Image Src","Image Position","Image Alt Text","Gift Card","SEO Title","SEO Description",
  "アレルゲン情報 (product.metafields.shopify.allergen-information)","国 (product.metafields.shopify.country)",
  "食事の好み (product.metafields.shopify.dietary-preferences)","フレーバー (product.metafields.shopify.flavor)",
  "ジンの種類 (product.metafields.shopify.gin-variety)","地域 (product.metafields.shopify.region)",
  "スピリット希釈 (product.metafields.shopify.spirit-dilution)","テキーラの種類 (product.metafields.shopify.tequila-variety)",
  "ウイスキーの種類 (product.metafields.shopify.whiskey-style)","ウイスキー各種 (product.metafields.shopify.whiskey-variety)",
  "Variant Image","Variant Weight Unit","Variant Tax Code","Cost per item","Included / 日本","Price / 日本",
  "Compare At Price / 日本","Status"];
function slugify(s){
  return String(s||"").toLowerCase()
    .replace(/[「」【】（）()｜|・、。／/，,＆&%％!！?？:：;；'"'"’]/g," ")
    .replace(/[\s　]+/g,"-").replace(/-+/g,"-").replace(/^-|-$/g,"").slice(0,120) || "romuan-item";
}
function buildShopifyCSV(list){
  list = list || DATA;
  const lines=[SHOPIFY_COLS.join(",")];
  const row=obj=>SHOPIFY_COLS.map(c=>csvCell(obj[c]||"")).join(",");
  list.forEach(s=>{
    const lp=lineOf(s); if(!lp && !s.name) return;
    const title=s.name || (lp?(lp.name_full||lp.name):"");
    const imgs=(lp&&lp.images&&lp.images.length)?lp.images:(lp&&lp.image_url?[lp.image_url]:[]);
    const handle=slugify(title);
    // メイン行（商品情報＋1枚目画像）
    lines.push(row({
      "Handle":handle, "Title":title, "Body (HTML)":bodyHtml(lp),
      "Vendor":(lp&&lp.brand)||"美酒館", "Type":(lp&&lp.category)||"",
      "Tags":[lp&&lp.brand,lp&&lp.category].filter(Boolean).join(", "), "Published":"FALSE",
      "Option1 Name":"Title", "Option1 Value":"Default Title",
      "Variant SKU":s.id, "Variant Inventory Tracker":"shopify", "Variant Inventory Qty":buildableQty(s),
      "Variant Inventory Policy":"deny", "Variant Fulfillment Service":"manual",
      "Variant Price":(lp?lp.price:""), "Variant Requires Shipping":"TRUE", "Variant Taxable":"TRUE",
      "Variant Weight Unit":"g", "Image Src":imgs[0]||"", "Image Position":imgs.length?"1":"",
      "Image Alt Text":title, "Gift Card":"FALSE", "Status":"draft"
    }));
    // 追加画像行（2枚目以降）
    for(let i=1;i<imgs.length;i++){
      lines.push(row({ "Handle":handle, "Image Src":imgs[i], "Image Position":String(i+1), "Image Alt Text":title }));
    }
  });
  return lines.join("\r\n");
}

// Yahoo!ショッピング 商品データ（ストアクリエイターPro 個別項目・TSV）
function buildYahooTSV(list){
  list = list || DATA;
  const cols=["code","name","price","sale-price","headline","caption","abstract","explanation","brand","product-category"];
  const lines=[cols.join("\t")];
  list.forEach(s=>{
    const lp=lineOf(s); if(!lp && !s.name) return;
    const title=s.name || (lp?(lp.name_full||lp.name):"");
    const row=[
      String(s.id).toLowerCase(), title, (lp?lp.price:""), "",
      (lp&&lp.catchphrase)||"", (lp?(lp.name_full||lp.name):""), (lp&&lp.catchphrase)||"",
      bodyHtml(lp), (lp&&lp.brand)||"", (lp&&lp.category)||""
    ];
    lines.push(row.map(tsvCell).join("\t"));
  });
  return lines.join("\r\n");
}

// エクスポート対象の販売登録（未掲載のみ or 全件）
function salesForExport(channel){
  const onlyPending = document.getElementById("expScope").value === "pending";
  return DATA.filter(s => (lineOf(s) || s.name) && (!onlyPending || !s.channels[channel].listed));
}
function afterExport(channel, list, label){
  if (document.getElementById("expScope").value !== "pending") return;
  if (confirm(`${list.length}件を書き出しました。\nこれらを「${label} 掲載済み」にして、次回のエクスポート対象から外しますか？`)){
    list.forEach(s => { s.channels[channel].listed = true; pushRow(s.id); });
    render();
  }
}
document.getElementById("expShopify").addEventListener("click",()=>{
  const list = salesForExport("shopify");
  if(!list.length){ alert("Shopify未掲載の販売登録がありません。"); return; }
  download("shopify_products.csv", buildShopifyCSV(list), "text/csv;charset=utf-8");
  afterExport("shopify", list, "Shopify");
});
document.getElementById("expYahoo").addEventListener("click",()=>{
  const list = salesForExport("yahoo");
  if(!list.length){ alert("Yahoo未掲載の販売登録がありません。"); return; }
  download("yahoo_items.tsv", buildYahooTSV(list), "text/tab-separated-values;charset=utf-8");
  afterExport("yahoo", list, "Yahoo!ショップ");
});

document.getElementById("reload").addEventListener("click",()=>{ if(confirm("サーバから最新を読み込みます。よろしいですか？")) loadServer(); });
document.getElementById("export").addEventListener("click",()=>{
  const out=JSON.stringify({updated_at:new Date().toISOString().slice(0,10),sales:DATA},null,2);
  const b=new Blob([out+"\n"],{type:"application/json"}); const a=document.createElement("a");
  a.href=URL.createObjectURL(b); a.download="sales_backup.json"; a.click(); URL.revokeObjectURL(a.href);
});
document.getElementById("q").addEventListener("input",render);

if (sessionStorage.getItem(GATE_KEY)==="1") unlock();
else document.getElementById("gatepw").focus();
