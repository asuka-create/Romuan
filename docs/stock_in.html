<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>入荷管理 | 美酒館トラッカー</title>
<style>
  :root {
    --bg: #ffffff; --surface: #ffffff; --surface2: #f6f7f9; --text: #1c1a17; --muted: #6b7280;
    --line: #e5e7eb; --accent: #7b1e2b; --accent2: #a83246;
    --ok: #1a7f5a; --err: #c0392b; --warn: #b8791b;
    --shadow: 0 2px 6px rgba(60,40,30,.10), 0 1px 2px rgba(60,40,30,.06);
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic UI", "Meiryo", system-ui, sans-serif;
    line-height: 1.6; -webkit-font-smoothing: antialiased; }
  /* ---- サイドバー ---- */
  .app-shell { display: flex; align-items: flex-start; min-height: 100vh; }
  .sidebar { width: 232px; flex: none; background: var(--surface); border-right: 1px solid var(--line);
    padding: 20px 14px; display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; box-sizing: border-box; }
  .sidebar .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 22px; padding: 0 4px; }
  .sidebar .brand-icon { width: 36px; height: 36px; border-radius: 10px; background: var(--accent); color: #fff;
    display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex: none; }
  .sidebar .brand-title { font-weight: 700; font-size: .92rem; line-height: 1.3; }
  .sidebar .brand-sub { font-size: .66rem; color: var(--muted); letter-spacing: .06em; font-weight: 600; }
  .sidenav { display: flex; flex-direction: column; gap: 3px; }
  .sidenav a { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px;
    color: var(--muted); text-decoration: none; font-size: .84rem; font-weight: 600; transition: .15s; }
  .sidenav a .ic { font-size: 1.05rem; width: 1.3em; text-align: center; }
  .sidenav a:hover { background: var(--surface2); color: var(--text); }
  .sidenav a.active { background: var(--accent); color: #fff; box-shadow: 0 2px 6px rgba(123,30,43,.25); }
  .sidebar-add { margin-top: 18px; background: var(--accent); color: #fff; border: none; border-radius: 10px;
    padding: 12px 10px; font-weight: 700; font-size: .84rem; cursor: pointer; }
  .sidebar-bottom { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--line); display: flex; flex-direction: column; gap: 2px; }
  .sidebar-bottom a { display: flex; align-items: center; gap: 8px; color: var(--muted); text-decoration: none; font-size: .8rem; padding: 8px 12px; border-radius: 8px; }
  .sidebar-bottom a:hover { background: var(--surface2); color: var(--text); }
  .main-area { flex: 1; min-width: 0; }
  @media (max-width: 860px) {
    .app-shell { flex-direction: column; }
    .sidebar { width: 100%; height: auto; position: relative; flex-direction: row; flex-wrap: wrap; align-items: center; gap: 10px 16px; }
    .sidebar .brand { margin-bottom: 0; }
    .sidenav { flex-direction: row; flex-wrap: wrap; }
    .sidebar-add { margin-top: 0; }
    .sidebar-bottom { margin-top: 0; padding-top: 0; border-top: none; flex-direction: row; }
  }

  header { padding: 18px 18px 14px; border-bottom: 1px solid var(--line); background: var(--surface); position: sticky; top: 0; z-index: 20; }
  .wrap { max-width: 1000px; margin: 0; }
  h1 { font-size: 1.2rem; margin: 0 0 4px; }
  h1 .en { color: var(--muted); font-weight: 400; font-size: .78rem; margin-left: 6px; }
  .meta { color: var(--muted); font-size: .82rem; margin-top: 6px; }
  .meta b { color: var(--text); }
  .toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-top: 12px; }
  input[type="search"] { flex: 1; min-width: 160px; font-size: .9rem; padding: 8px 11px;
    border: 1px solid var(--line); border-radius: 9px; background: var(--surface2); color: var(--text); }
  button { font-size: .85rem; font-weight: 600; padding: 8px 13px; border: 1px solid var(--line);
    border-radius: 9px; background: var(--surface); color: var(--text); cursor: pointer; }
  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.ghost { background: transparent; }
  .sync { font-size: .78rem; margin-left: auto; display: flex; align-items: center; gap: 6px; color: var(--muted); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .sync.ok .dot { background: var(--ok); } .sync.saving .dot { background: var(--warn); } .sync.err .dot { background: var(--err); }
  main { max-width: 1000px; margin: 0; padding: 16px 14px 80px; }
  .tablewrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 14px; background: var(--surface); box-shadow: var(--shadow); }
  table { border-collapse: separate; border-spacing: 0; width: 100%; min-width: 640px; font-size: .9rem; }
  th, td { padding: 10px 12px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: middle; }
  thead th { background: var(--surface2); color: var(--muted); font-weight: 700; font-size: .76rem; white-space: nowrap; position: sticky; top: 0; }
  tbody tr:nth-child(even) td { background: var(--surface2); }
  tbody tr:hover td { background: color-mix(in srgb, var(--accent) 7%, var(--surface)); }
  td input, td select { width: 100%; font-size: .9rem; padding: 7px 9px; border: 1px solid var(--line);
    border-radius: 8px; background: var(--surface); color: var(--text); }
  td.qty input { width: 84px; text-align: center; font-weight: 700; }
  .del { color: var(--err); border: none; background: transparent; font-size: 1rem; padding: 4px 8px; cursor: pointer; }
  .empty { text-align: center; color: var(--muted); padding: 40px 20px; }
  #gate { position: fixed; inset: 0; z-index: 999; background: var(--bg); display: flex; align-items: center; justify-content: center; padding: 20px; }
  #gate .box { background: var(--surface); border: 1px solid var(--line); border-radius: 16px; box-shadow: var(--shadow); padding: 30px 26px; width: 100%; max-width: 360px; text-align: center; }
  #gate h2 { margin: 0 0 6px; font-size: 1.05rem; }
  #gate p { margin: 0 0 18px; color: var(--muted); font-size: .82rem; }
  #gate input { width: 100%; font-size: 1rem; padding: 11px 13px; border: 1px solid var(--line); border-radius: 10px; background: var(--surface2); color: var(--text); text-align: center; margin-bottom: 12px; }
  #gate button { width: 100%; font-size: .95rem; padding: 11px; border: none; border-radius: 10px; background: var(--accent); color: #fff; }
  #gate .err { color: var(--err); font-size: .8rem; min-height: 1.2em; margin-top: 10px; }
  body.locked { overflow: hidden; }
</style>
</head>
<body class="locked">
<div id="gate">
  <div class="box">
    <h2>入荷管理</h2>
    <p>閲覧には合言葉が必要です</p>
    <input type="password" id="gatepw" placeholder="合言葉を入力" autocomplete="current-password">
    <button id="gatebtn">開く</button>
    <div class="err" id="gateerr"></div>
  </div>
</div>

<div class="app-shell">
<aside class="sidebar">
  <div class="brand">
    <div class="brand-icon">🍶</div>
    <div>
      <div class="brand-title">美酒館トラッカー</div>
      <div class="brand-sub">OPERATIONS HUB</div>
    </div>
  </div>
  <nav class="sidenav">
    <a href="manage.html"><span class="ic">📦</span>社内 商品マスター</a>
    <a href="sales.html"><span class="ic">🏷️</span>販売登録</a>
    <a href="fulfillment.html"><span class="ic">🚚</span>出庫管理</a>
    <a href="stock_in.html" class="active"><span class="ic">📥</span>入荷管理</a>
    <a href="index.html"><span class="ic">🎁</span>LINE GIFT 商品</a>
    <a href="orders.html"><span class="ic">📮</span>注文管理</a>
    <a href="brushup.html"><span class="ic">✨</span>ブラッシュアップ</a>
  </nav>
  <button class="sidebar-add" id="sidebarAdd" style="display:none"></button>
  <div class="sidebar-bottom">
    <a href="#" id="logoutBtn">↩ ログアウト</a>
  </div>
</aside>
<div class="main-area">
<header>
  <div class="wrap">
    <h1>入荷管理<span class="en">stock-in log</span></h1>
    <div class="meta">
      商品の入荷を記録します。数量を入力すると、社内商品マスターの在庫に自動で加算されます（削除・修正すると差分が自動で調整されます）。<br>
      記録件数 <b id="count">-</b> 件
    </div>
    <div class="toolbar">
      <input type="search" id="q" placeholder="商品名・コメントで検索…">
      <button id="addrow" class="primary">＋ 入荷を記録</button>
      <button id="reload" class="ghost">サーバから再読込</button>
      <span class="sync" id="sync"><span class="dot"></span><span id="syncmsg">—</span></span>
    </div>
  </div>
</header>

<main>
  <div class="tablewrap">
    <table>
      <thead>
        <tr><th>商品</th><th>数量</th><th>入荷日</th><th>賞味期限</th><th>残数</th><th>コメント</th><th>記録日時</th><th></th></tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="empty" id="empty" style="display:none">入荷記録がありません。「＋ 入荷を記録」から追加してください。</div>
</main>
</div>
</div>

<script>
const PW_HASH = "86138699a5c3861fd957004d5c07c6466e7470eb0cffd2152d928a5bcf9a738a";
const GATE_KEY = "bijoukan_gate_ok";
const CACHE_KEY = "stockin_cache_v1";
const SB_URL = "https://qbfjeitlzrtazavklhde.supabase.co";
const SB_KEY = "sb_publishable_gCDMwBOWaSwq6uh34lWRXA_rYQ6VptD";
const SB_STOCKIN = SB_URL + "/rest/v1/romuan_stock_in";
const SB_PRODUCTS = SB_URL + "/rest/v1/romuan_products";
let DATA = [], PRODUCTS = [];

function sbHeaders(extra){ return Object.assign({ "apikey": SB_KEY, "Authorization":"Bearer "+SB_KEY, "Content-Type":"application/json" }, extra||{}); }

async function sha256(str){ const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(str)); return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,"0")).join(""); }
function unlock(){ document.getElementById("gate").style.display="none"; document.body.classList.remove("locked"); init(); }
async function tryUnlock(){ const pw=document.getElementById("gatepw").value; if(await sha256(pw)===PW_HASH){ sessionStorage.setItem(GATE_KEY,"1"); unlock(); } else { document.getElementById("gateerr").textContent="合言葉が違います"; document.getElementById("gatepw").select(); } }
document.getElementById("gatebtn").addEventListener("click",tryUnlock);
document.getElementById("gatepw").addEventListener("keydown",e=>{ if(e.key==="Enter") tryUnlock(); });

function setSync(state,msg){ document.getElementById("sync").className="sync "+state; document.getElementById("syncmsg").textContent=msg; }

async function init(){
  try {
    const r = await fetch(SB_PRODUCTS + "?select=id,name,stock&order=position.asc", { headers: sbHeaders() });
    PRODUCTS = r.ok ? await r.json() : [];
  } catch { PRODUCTS = []; }
  await loadServer();
}
async function loadServer(){
  setSync("saving","読み込み中…");
  try {
    const r = await fetch(SB_STOCKIN + "?select=*&order=created_at.desc", { headers: sbHeaders() });
    if (!r.ok) throw new Error("HTTP "+r.status);
    DATA = await r.json();
    localStorage.setItem(CACHE_KEY, JSON.stringify(DATA));
    setSync("ok","サーバと同期済み ✓");
  } catch(e){
    const c = localStorage.getItem(CACHE_KEY);
    DATA = c ? JSON.parse(c) : [];
    setSync("err","オフライン: キャッシュ表示中");
  }
  render();
}

async function adjustStock(productId, delta){
  if (!productId || !delta) return;
  const p = PRODUCTS.find(x=>x.id===productId);
  const current = p ? (Number(p.stock)||0) : 0;
  const next = Math.max(0, current + delta);
  if (p) p.stock = next;
  try { await fetch(SB_PRODUCTS + "?id=eq."+encodeURIComponent(productId), { method:"PATCH", headers: sbHeaders(), body: JSON.stringify({ stock: next }) }); }
  catch(e){}
}

const timers = {};
function scheduleSave(id){
  clearTimeout(timers[id]);
  setSync("saving","保存中…");
  timers[id] = setTimeout(()=>pushRow(id), 500);
}
async function pushRow(id){
  const r = DATA.find(x=>x.id===id); if (!r) return;
  try {
    const body = { id:r.id, product_id:r.product_id||null, qty:Number(r.qty)||0, arrival_date:r.arrival_date||null, expiration_date:r.expiration_date||null, remaining_qty:Number(r.remaining_qty)||0, comment:r.comment||"" };
    const res = await fetch(SB_STOCKIN, { method:"POST", headers: sbHeaders({ "Prefer":"resolution=merge-duplicates,return=minimal" }), body: JSON.stringify([body]) });
    if (!res.ok) throw new Error("HTTP "+res.status);
    setSync("ok","サーバ保存済み ✓"); localStorage.setItem(CACHE_KEY, JSON.stringify(DATA));
  } catch(e){ setSync("err","⚠ サーバ未保存"); }
}
async function deleteRow(id){
  try { await fetch(SB_STOCKIN + "?id=eq."+encodeURIComponent(id), { method:"DELETE", headers: sbHeaders() }); setSync("ok","削除しました ✓"); }
  catch(e){ setSync("err","⚠ 削除の同期に失敗"); }
  localStorage.setItem(CACHE_KEY, JSON.stringify(DATA));
}

function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function productOptions(sel){
  let o = '<option value="">（商品を選択…）</option>';
  for (const p of PRODUCTS){ o += `<option value="${esc(p.id)}"${p.id===sel?" selected":""}>${esc(p.name)}（${esc(p.id)}）</option>`; }
  if (sel && !PRODUCTS.some(p=>p.id===sel)) o += `<option value="${esc(sel)}" selected>${esc(sel)}（一覧外）</option>`;
  return o;
}
function fmtDT(s){ if(!s) return "-"; const d=new Date(s); return isNaN(d) ? s : d.toLocaleString("ja-JP",{year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}); }
function daysUntil(dateStr){ if(!dateStr) return null; const d=new Date(dateStr+"T00:00:00+09:00"); return Math.floor((d.getTime()-Date.now())/86400000); }

function render(){
  const q = document.getElementById("q").value.trim().toLowerCase();
  const tb = document.getElementById("tbody"); tb.innerHTML = "";
  let shown = 0;
  DATA.forEach((r,i)=>{
    const pname = (PRODUCTS.find(p=>p.id===r.product_id)||{}).name || "";
    if (q && ![pname, r.comment].join(" ").toLowerCase().includes(q)) return;
    shown++;
    const dLeft = daysUntil(r.expiration_date);
    let expStyle = "";
    if (dLeft!=null && (Number(r.remaining_qty)||0) > 0){
      if (dLeft <= 30) expStyle = "color:var(--err);font-weight:700";
      else if (dLeft <= 45) expStyle = "color:var(--warn);font-weight:700";
    }
    const tr = document.createElement("tr");
    tr.innerHTML =
      `<td><select data-i="${i}" data-f="product_id">${productOptions(r.product_id)}</select></td>`+
      `<td class="qty"><input type="number" min="0" value="${Number(r.qty)||0}" data-i="${i}" data-f="qty"></td>`+
      `<td><input type="date" value="${esc(r.arrival_date||"")}" data-i="${i}" data-f="arrival_date"></td>`+
      `<td><input type="date" value="${esc(r.expiration_date||"")}" data-i="${i}" data-f="expiration_date" style="${expStyle}"></td>`+
      `<td class="qty"><span style="${expStyle}">${Number(r.remaining_qty)||0}</span></td>`+
      `<td><input value="${esc(r.comment)}" data-i="${i}" data-f="comment" placeholder="—"></td>`+
      `<td>${fmtDT(r.created_at)}</td>`+
      `<td><button class="del" data-i="${i}" title="削除">🗑</button></td>`;
    tb.appendChild(tr);
  });
  document.getElementById("count").textContent = DATA.length;
  document.getElementById("empty").style.display = shown ? "none" : "block";
}

document.getElementById("tbody").addEventListener("change", async e=>{
  const el = e.target, i = el.dataset.i, f = el.dataset.f; if (i==null) return;
  const r = DATA[i];
  if (f==="qty"){
    const oldQty = Number(r.qty)||0;
    const newQty = Math.max(0, parseInt(el.value||"0",10)||0);
    const delta = newQty - oldQty;
    if (r.product_id) await adjustStock(r.product_id, delta);
    r.qty = newQty;
    r.remaining_qty = Math.max(0, (Number(r.remaining_qty)||0) + delta);
    render(); scheduleSave(r.id);
  } else if (f==="product_id"){
    const oldPid = r.product_id, newPid = el.value || null;
    if (oldPid) await adjustStock(oldPid, -(Number(r.qty)||0));
    if (newPid) await adjustStock(newPid, (Number(r.qty)||0));
    r.product_id = newPid; render(); scheduleSave(r.id);
  } else if (f==="expiration_date"){
    r.expiration_date = el.value || null; render(); scheduleSave(r.id);
  } else {
    r[f] = el.value; scheduleSave(r.id);
  }
});
document.getElementById("tbody").addEventListener("click", async e=>{
  if (!e.target.classList.contains("del")) return;
  const i = +e.target.dataset.i, r = DATA[i];
  const pname = (PRODUCTS.find(p=>p.id===r.product_id)||{}).name || r.product_id || "(商品未選択)";
  if (!confirm(`${pname} の入荷記録（残数${Number(r.remaining_qty)||0}）を削除しますか？\n（在庫は残数の分だけ自動的に元へ戻します）`)) return;
  if (r.product_id) await adjustStock(r.product_id, -(Number(r.remaining_qty)||0));
  DATA.splice(i,1);
  await deleteRow(r.id);
  render();
});

function nextId(){
  let m = 0;
  for (const r of DATA){ const x = /^SI(\d+)$/.exec(r.id||""); if (x) m = Math.max(m, parseInt(x[1],10)); }
  return "SI" + String(m+1).padStart(5,"0");
}
document.getElementById("addrow").addEventListener("click", ()=>{
  const r = { id: nextId(), product_id: null, qty: 0, arrival_date: new Date().toISOString().slice(0,10), expiration_date: null, remaining_qty: 0, comment: "" };
  DATA.unshift(r);
  document.getElementById("q").value = "";
  render();
  scheduleSave(r.id);
  const sel = document.querySelector('#tbody tr:first-child select'); if (sel) sel.focus();
});
document.getElementById("reload").addEventListener("click", ()=>{ if (confirm("サーバから最新を読み込みます。よろしいですか？")) loadServer(); });
document.getElementById("q").addEventListener("input", render);

/* ---------- サイドバー: ログアウト・新規追加 ---------- */
document.getElementById("logoutBtn").addEventListener("click", e=>{
  e.preventDefault();
  sessionStorage.removeItem(GATE_KEY);
  location.reload();
});
(function(){
  const target = document.getElementById("addrow") || document.getElementById("addsale") || document.getElementById("addorder");
  const btn = document.getElementById("sidebarAdd");
  if (target && btn){
    btn.textContent = target.textContent;
    btn.style.display = "block";
    btn.addEventListener("click", ()=>target.click());
  }
})();

if (sessionStorage.getItem(GATE_KEY)==="1") unlock();
else document.getElementById("gatepw").focus();
</script>
</body>
</html>
